services:
  postgres:
    image: postgres:17-alpine
    container_name: ${CONTAINER_NAME}
    environment:
      POSTGRES_USER: ${PGUSER}
      POSTGRES_PASSWORD: ${PGPASSWORD}
      POSTGRES_DB: ${PGDATABASE}
      PGDATA: ${PGDATA}
    ports:
      - "${PGPORT}:5432"
    volumes:
      - retech_meufin_db_volume:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PGUSER}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - retech-network

  api:
    build: .
    container_name: retech-meufin-app
    ports:
      - "${APP_PORT:-8002}:8080"
    environment:
      DB_HOST: ${DB_HOST:-postgres}
      DB_PORT: ${DB_PORT:-5432}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
      DB_SSLMODE: ${DB_SSLMODE:-disable}
      APP_PORT: ${APP_PORT:-8002}
      APP_ENV: ${APP_ENV:-development}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      MIGRATIONS_PATH: ${MIGRATIONS_PATH:-/app/migrations}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - retech-network

networks:
  retech-network:
    driver: bridge

volumes:
  retech_meufin_db_volume:
    name: ${PGVOLUME_NAME}
