services:
  postgres:
    image: postgres:16-alpine
    container_name: retech-meufin-db
    environment:
      POSTGRES_USER: retech_meufin_user
      POSTGRES_PASSWORD: d18cf320-18f3-4a88-a030-9b4069454ebf
      POSTGRES_DB: retech_meufin_db
    ports:
      - "5432:5432"
    volumes:
      - retech_meufin_db_volume:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U retech_meufin_user -d retech-meufin-db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - retech-meufin-network

  api:
    build: .
    ports:
      - "8002:8080"
    environment:
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_USER: retech_meufin_user
      DB_PASSWORD: d18cf320-18f3-4a88-a030-9b4069454ebf
      DB_NAME: retech_meufin_db
      DB_SSLMODE: disable
      APP_PORT: "8002"
      APP_ENV: development
      LOG_LEVEL: INFO
      MIGRATIONS_PATH: /app/migrations
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  retech_meufin_db_volume:

networks:
  retech-meufin-network:
    driver: bridge